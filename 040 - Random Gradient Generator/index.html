<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Gradient Generator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <nav class="navbar">
      <div class="nav-logo"><i class="fa-solid fa-palette"></i> <span>GradientLab</span></div>
    </nav>

    <div class="preview-card" id="previewCard">
      <div class="preview-overlay">
        <span class="preview-label">Preview</span>
      </div>
    </div>

    <div class="controls-card">
      <div class="css-output">
        <code id="cssCode">background: linear-gradient(135deg, #818cf8, #6366f1);</code>
        <button class="copy-btn" id="copyBtn"><i class="fa-solid fa-copy"></i></button>
      </div>

      <div class="options-row">
        <div class="form-group">
          <label>Direction</label>
          <select id="direction">
            <option value="to right">To Right</option>
            <option value="to left">To Left</option>
            <option value="to bottom">To Bottom</option>
            <option value="to top">To Top</option>
            <option value="135deg" selected>Diagonal ↘</option>
            <option value="45deg">Diagonal ↗</option>
            <option value="circle">Radial</option>
          </select>
        </div>
        <div class="form-group">
          <label>Colors</label>
          <select id="colorCount">
            <option value="2" selected>2 Colors</option>
            <option value="3">3 Colors</option>
            <option value="4">4 Colors</option>
          </select>
        </div>
      </div>

      <div class="color-stops" id="colorStops">
        <div class="color-stop">
          <input type="color" class="stop-color" value="#818cf8" />
        </div>
        <div class="color-stop">
          <input type="color" class="stop-color" value="#6366f1" />
        </div>
      </div>

      <div class="btn-row">
        <button class="primary-btn" id="randomBtn"><i class="fa-solid fa-shuffle"></i> Random Gradient</button>
      </div>
    </div>

    <div class="saved-section hidden" id="savedSection">
      <h2>Saved Gradients</h2>
      <div class="saved-grid" id="savedGrid"></div>
    </div>

    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
