<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <nav class="navbar">
      <div class="nav-logo"><i class="fa-solid fa-wallet"></i> <span>ExpenseTrack</span></div>
    </nav>

    <div class="summary-row">
      <div class="summary-card income"><label>Income</label><span id="totalIncome">$0.00</span></div>
      <div class="summary-card balance"><label>Balance</label><span id="totalBalance">$0.00</span></div>
      <div class="summary-card expense"><label>Expense</label><span id="totalExpense">$0.00</span></div>
    </div>

    <div class="add-card">
      <h2>Add Transaction</h2>
      <form id="txForm">
        <div class="form-row">
          <div class="form-group grow">
            <label>Description</label>
            <input type="text" id="txDesc" placeholder="e.g. Salary, Groceries" required />
          </div>
          <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" id="txAmount" placeholder="0.00" step="0.01" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Type</label>
            <select id="txType">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="txCategory">
              <option value="food">Food</option>
              <option value="transport">Transport</option>
              <option value="shopping">Shopping</option>
              <option value="bills">Bills</option>
              <option value="salary">Salary</option>
              <option value="freelance">Freelance</option>
              <option value="other">Other</option>
            </select>
          </div>
          <button type="submit" class="add-btn"><i class="fa-solid fa-plus"></i> Add</button>
        </div>
      </form>
    </div>

    <div class="history-card">
      <div class="history-header">
        <h2>History</h2>
        <button class="clear-btn" id="clearBtn"><i class="fa-solid fa-trash"></i> Clear All</button>
      </div>
      <div class="empty-state" id="emptyState"><i class="fa-solid fa-receipt"></i><p>No transactions yet.</p></div>
      <div class="tx-list" id="txList"></div>
    </div>

    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
