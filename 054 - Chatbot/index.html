<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <nav class="navbar">
      <div class="nav-logo"><i class="fa-solid fa-robot"></i> <span>ChatBot</span></div>
      <button class="clear-btn" id="clearBtn"><i class="fa-solid fa-trash"></i> Clear</button>
    </nav>

    <div class="chat-container" id="chatContainer">
      <div class="message bot">
        <div class="msg-avatar"><i class="fa-solid fa-robot"></i></div>
        <div class="msg-bubble">
          <p>Hi there! I'm ChatBot. Ask me anything — I know about weather, math, jokes, time, and more. Try saying <strong>"tell me a joke"</strong> or <strong>"what time is it?"</strong></p>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" />
      <button class="send-btn" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
