<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <header class="header"><h1 class="title"><i class="fa-solid fa-list-check"></i> To-Do <span class="accent">List</span></h1></header>
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button class="add-btn" id="addBtn"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All <span class="badge" id="countAll">0</span></button>
      <button class="filter-btn" data-filter="active">Active <span class="badge" id="countActive">0</span></button>
      <button class="filter-btn" data-filter="completed">Done <span class="badge" id="countDone">0</span></button>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <div class="empty-msg" id="emptyMsg"><i class="fa-solid fa-clipboard-list"></i><p>No tasks yet. Add one above!</p></div>
    <div class="clear-row" id="clearRow"><button class="clear-btn" id="clearDone"><i class="fa-solid fa-trash-can"></i> Clear Completed</button></div>
    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
