<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <header class="header"><div class="logo"><i class="fa-solid fa-cake-candles"></i> <span>AgeCalc</span></div></header>
    <main class="main">
      <h1 class="title">Age <span class="accent">Calculator</span></h1>
      <p class="subtitle">Enter your date of birth and discover your exact age.</p>
      <div class="input-card">
        <div class="date-fields">
          <div class="date-field"><label>Day</label><input type="number" id="day" placeholder="DD" min="1" max="31" /></div>
          <div class="date-field"><label>Month</label><input type="number" id="month" placeholder="MM" min="1" max="12" /></div>
          <div class="date-field"><label>Year</label><input type="number" id="year" placeholder="YYYY" min="1900" max="2026" /></div>
        </div>
        <button class="calc-btn" id="calcBtn"><i class="fa-solid fa-calculator"></i> Calculate Age</button>
        <p class="error-msg" id="errorMsg"></p>
      </div>
      <div class="results" id="results">
        <div class="age-main">
          <div class="age-block"><span class="age-num" id="resYears">--</span><span class="age-label">Years</span></div>
          <div class="age-block"><span class="age-num" id="resMonths">--</span><span class="age-label">Months</span></div>
          <div class="age-block"><span class="age-num" id="resDays">--</span><span class="age-label">Days</span></div>
        </div>
        <div class="fun-facts" id="funFacts">
          <div class="fact"><i class="fa-solid fa-calendar-days"></i><div><strong id="totalDays">0</strong><span>Total Days Alive</span></div></div>
          <div class="fact"><i class="fa-solid fa-clock"></i><div><strong id="totalHours">0</strong><span>Total Hours</span></div></div>
          <div class="fact"><i class="fa-solid fa-heart-pulse"></i><div><strong id="heartbeats">0</strong><span>Est. Heartbeats</span></div></div>
          <div class="fact"><i class="fa-solid fa-moon"></i><div><strong id="sleepYears">0</strong><span>Years Sleeping</span></div></div>
        </div>
        <div class="next-bday" id="nextBday"></div>
      </div>
    </main>
    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
