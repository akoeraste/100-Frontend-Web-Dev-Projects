<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo"><i class="fa-solid fa-clock"></i> <span>Pomodoro</span></div>
      <div class="sessions-badge" id="sessionsBadge">
        <i class="fa-solid fa-fire"></i> <span id="sessionsCount">0</span> sessions
      </div>
    </header>

    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="focus" data-minutes="25">Focus</button>
      <button class="mode-tab" data-mode="short" data-minutes="5">Short Break</button>
      <button class="mode-tab" data-mode="long" data-minutes="15">Long Break</button>
    </div>

    <div class="timer-card" id="timerCard">
      <div class="ring-wrap">
        <svg class="ring" viewBox="0 0 220 220">
          <circle class="ring-track" cx="110" cy="110" r="96" />
          <circle class="ring-fill" id="ringFill" cx="110" cy="110" r="96" />
        </svg>
        <div class="timer-inner">
          <div class="time-display" id="timeDisplay">25:00</div>
          <div class="mode-label" id="modeLabel">Focus Time</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-icon" id="resetBtn" title="Reset">
        <i class="fa-solid fa-rotate-left"></i>
      </button>
      <button class="btn-primary" id="startBtn">
        <i class="fa-solid fa-play" id="startIcon"></i>
        <span id="startText">Start</span>
      </button>
      <button class="btn-icon" id="skipBtn" title="Skip">
        <i class="fa-solid fa-forward-step"></i>
      </button>
    </div>

    <div class="info-row">
      <div class="info-chip">
        <i class="fa-solid fa-circle-info"></i>
        <span>Focus 25 min → Break 5 min cycle</span>
      </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>

  </div>
  <script src="js/script.js"></script>
</body>
</html>
