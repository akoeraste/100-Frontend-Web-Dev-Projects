<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <div class="calculator">
      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="current" id="current">0</div>
      </div>
      <div class="keypad">
        <button class="key fn" data-action="clear">AC</button>
        <button class="key fn" data-action="toggle">+/−</button>
        <button class="key fn" data-action="percent">%</button>
        <button class="key op" data-action="operator" data-value="÷">÷</button>
        <button class="key num" data-action="number" data-value="7">7</button>
        <button class="key num" data-action="number" data-value="8">8</button>
        <button class="key num" data-action="number" data-value="9">9</button>
        <button class="key op" data-action="operator" data-value="×">×</button>
        <button class="key num" data-action="number" data-value="4">4</button>
        <button class="key num" data-action="number" data-value="5">5</button>
        <button class="key num" data-action="number" data-value="6">6</button>
        <button class="key op" data-action="operator" data-value="−">−</button>
        <button class="key num" data-action="number" data-value="1">1</button>
        <button class="key num" data-action="number" data-value="2">2</button>
        <button class="key num" data-action="number" data-value="3">3</button>
        <button class="key op" data-action="operator" data-value="+">+</button>
        <button class="key num zero" data-action="number" data-value="0">0</button>
        <button class="key num" data-action="decimal">.</button>
        <button class="key eq" data-action="equals">=</button>
      </div>
    </div>
    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
