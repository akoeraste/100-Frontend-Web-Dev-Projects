<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Slideshow</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <nav class="navbar">
      <div class="nav-logo"><i class="fa-solid fa-images"></i> <span>SlideView</span></div>
      <div class="auto-toggle">
        <label>Auto-play</label>
        <button class="toggle-btn active" id="autoToggle"><div class="toggle-thumb"></div></button>
      </div>
    </nav>

    <div class="slideshow" id="slideshow">
      <div class="slides-container" id="slidesContainer"></div>

      <button class="slide-btn prev" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
      <button class="slide-btn next" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>

      <div class="slide-caption" id="slideCaption"></div>
      <div class="slide-counter" id="slideCounter">1 / 6</div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="thumbs" id="thumbs"></div>

    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
