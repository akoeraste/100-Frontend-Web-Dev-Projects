<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo"><i class="fa-solid fa-images"></i> <span>Gallery</span></div>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
        <button class="filter-btn" data-filter="city">City</button>
        <button class="filter-btn" data-filter="abstract">Abstract</button>
      </div>
    </header>
    <main class="gallery" id="gallery">
      <div class="gallery-item" data-cat="nature"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&h=400&fit=crop" alt="Mountain landscape" /><div class="item-overlay"><span>Mountain Valley</span></div></div>
      <div class="gallery-item" data-cat="city"><img src="https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600&h=400&fit=crop" alt="City skyline" /><div class="item-overlay"><span>City Skyline</span></div></div>
      <div class="gallery-item" data-cat="abstract"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&h=400&fit=crop" alt="Abstract art" /><div class="item-overlay"><span>Color Flow</span></div></div>
      <div class="gallery-item" data-cat="nature"><img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&h=400&fit=crop" alt="Foggy forest" /><div class="item-overlay"><span>Foggy Forest</span></div></div>
      <div class="gallery-item" data-cat="city"><img src="https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=600&h=400&fit=crop" alt="Street view" /><div class="item-overlay"><span>Urban Street</span></div></div>
      <div class="gallery-item" data-cat="abstract"><img src="https://images.unsplash.com/photo-1557672172-298e090bd0f1?w=600&h=400&fit=crop" alt="Pink abstract" /><div class="item-overlay"><span>Blush Wave</span></div></div>
      <div class="gallery-item" data-cat="nature"><img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600&h=400&fit=crop" alt="Stars over mountains" /><div class="item-overlay"><span>Starry Night</span></div></div>
      <div class="gallery-item" data-cat="city"><img src="https://images.unsplash.com/photo-1514565131-fce0801e5785?w=600&h=400&fit=crop" alt="Neon city" /><div class="item-overlay"><span>Neon Lights</span></div></div>
      <div class="gallery-item" data-cat="abstract"><img src="https://images.unsplash.com/photo-1567095761054-7a02e69e5b2b?w=600&h=400&fit=crop" alt="Gradient abstract" /><div class="item-overlay"><span>Gradient Shift</span></div></div>
      <div class="gallery-item" data-cat="nature"><img src="https://images.unsplash.com/photo-1474511320723-9a56873571b7?w=600&h=400&fit=crop" alt="Ocean waves" /><div class="item-overlay"><span>Ocean Waves</span></div></div>
      <div class="gallery-item" data-cat="city"><img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&h=400&fit=crop" alt="Bridge at night" /><div class="item-overlay"><span>Night Bridge</span></div></div>
      <div class="gallery-item" data-cat="nature"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&h=400&fit=crop" alt="Lake sunset" /><div class="item-overlay"><span>Golden Lake</span></div></div>
    </main>
    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose"><i class="fa-solid fa-xmark"></i></button>
    <button class="lb-nav lb-prev" id="lbPrev"><i class="fa-solid fa-chevron-left"></i></button>
    <button class="lb-nav lb-next" id="lbNext"><i class="fa-solid fa-chevron-right"></i></button>
    <img id="lbImg" alt="" />
    <div class="lb-caption" id="lbCaption"></div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
