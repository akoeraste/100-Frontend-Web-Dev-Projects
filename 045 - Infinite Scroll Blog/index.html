<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Scroll Blog</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <nav class="navbar">
      <div class="nav-logo"><i class="fa-solid fa-newspaper"></i> <span>ScrollBlog</span></div>
    </nav>

    <section class="hero">
      <h1>Infinite <span class="accent">Scroll</span></h1>
      <p>Blog posts load dynamically as you scroll down — no pagination needed.</p>
    </section>

    <div class="posts" id="posts"></div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span>Loading more posts...</span>
    </div>

    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
