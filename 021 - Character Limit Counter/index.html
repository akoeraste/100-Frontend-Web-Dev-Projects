<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Limit Counter</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <header class="header"><div class="logo"><i class="fa-solid fa-text-slash"></i> <span>CharCount</span></div></header>
    <main class="main">
      <h1 class="title">Character <span class="accent">Counter</span></h1>
      <p class="subtitle">See your live character count with a configurable limit.</p>
      <div class="limit-row"><label>Character Limit:</label><input type="number" id="limitInput" value="280" min="1" max="10000" /></div>
      <div class="textarea-card" id="textareaCard">
        <textarea id="textArea" placeholder="Start typing here..." rows="8"></textarea>
        <div class="counter-row">
          <div class="ring-wrap">
            <svg class="ring" viewBox="0 0 40 40"><circle cx="20" cy="20" r="17" class="ring-bg" /><circle cx="20" cy="20" r="17" class="ring-fill" id="ringFill" /></svg>
          </div>
          <span class="counter-text"><span id="charCount">0</span> / <span id="charLimit">280</span></span>
          <span class="remaining" id="remaining">280 remaining</span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      </div>
      <div class="stats-row">
        <div class="mini-stat"><span class="ms-num" id="wordCount">0</span><span class="ms-label">Words</span></div>
        <div class="mini-stat"><span class="ms-num" id="lineCount">0</span><span class="ms-label">Lines</span></div>
        <div class="mini-stat"><span class="ms-num" id="noSpaceCount">0</span><span class="ms-label">No Spaces</span></div>
      </div>
    </main>
    <footer class="footer"><p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p></footer>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
