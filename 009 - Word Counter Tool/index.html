<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Counter Tool</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo"><i class="fa-solid fa-text-width"></i> <span>WordCount</span></div>
    </header>
    <main class="main">
      <h1 class="title">Word Counter <span class="accent">Tool</span></h1>
      <p class="subtitle">Paste or type text and get live stats instantly.</p>
      <div class="textarea-card">
        <textarea id="textArea" placeholder="Start typing or paste your text here..." rows="10"></textarea>
        <div class="textarea-actions">
          <button class="action-btn" id="copyBtn"><i class="fa-regular fa-copy"></i> Copy</button>
          <button class="action-btn" id="clearBtn"><i class="fa-solid fa-trash-can"></i> Clear</button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><span class="stat-num" id="words">0</span><span class="stat-label">Words</span></div>
        <div class="stat-card"><span class="stat-num" id="chars">0</span><span class="stat-label">Characters</span></div>
        <div class="stat-card"><span class="stat-num" id="sentences">0</span><span class="stat-label">Sentences</span></div>
        <div class="stat-card"><span class="stat-num" id="paragraphs">0</span><span class="stat-label">Paragraphs</span></div>
        <div class="stat-card"><span class="stat-num" id="readTime">0</span><span class="stat-label">Min Read</span></div>
        <div class="stat-card"><span class="stat-num" id="speakTime">0</span><span class="stat-label">Min Speak</span></div>
      </div>
      <div class="density-card" id="densityCard">
        <h3><i class="fa-solid fa-chart-bar"></i> Top Keywords</h3>
        <div class="density-list" id="densityList"><p class="empty-msg">Start typing to see keyword density.</p></div>
      </div>
    </main>
    <footer class="footer">
      <p>Built with love as part of the <a href="https://github.com/akoeraste/100-Frontend-Web-Dev-Projects" target="_blank" rel="noopener">100 Frontend Web Dev Projects</a> challenge.</p>
    </footer>
  </div>
  <div class="toast" id="toast"><i class="fa-solid fa-check"></i> <span id="toastMsg">Copied!</span></div>
  <script src="js/script.js"></script>
</body>
</html>
